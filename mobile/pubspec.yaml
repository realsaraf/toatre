name: toatre
description: "Toatre — mic-first personal timeline assistant"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.5

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  firebase_analytics: ^12.0.2
  firebase_messaging: 16.2.0
  firebase_remote_config: ^6.0.2

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

  # Network
  http: ^1.5.0

  # Local Storage
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Audio & Mic
  record: ^6.2.0
  audioplayers: ^6.5.1
  permission_handler: ^11.4.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  url_launcher: ^6.3.1

  # Error Tracking
  sentry_flutter: ^9.7.0

  # Analytics
  posthog_flutter: ^4.6.0
  mixpanel_flutter: ^2.3.4
  purchases_flutter: ^8.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.6
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
